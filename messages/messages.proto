// Data contracts for christiangeorgelucas/graph-tools.
//
// The canonical envelope is `Graph`. The graph-producing nodes
// (MinimumSpanningTree, Subgraph) return `Graph` as their TOP-LEVEL output
// message, and the graph-consuming nodes (TopologicalSort, ConnectedComponents,
// DetectCycle, Describe) take `Graph` as their top-level input, so those nodes
// wire together in a flow with an identity edge and no adapter.
//
// NOTE ON DOC COMMENTS: every field comment in this file is a LEADING comment
// (on its own line, above the field). Trailing comments are discarded by the
// schema compiler and never reach the registry, so field documentation written
// after the semicolon is invisible to anyone browsing the marketplace.

syntax = "proto3";

package christiangeorgelucas.graph_tools;

option go_package = ".;gen";

// A single vertex of a graph.
message GraphNode {
  // Stable unique vertex identifier, chosen by the caller. Must be non-empty
  // and at most 256 bytes. Duplicate ids are rejected.
  string id = 1;
  // Optional human-readable label, at most 1024 bytes. Carried through
  // unchanged by the graph-producing nodes.
  string label = 2;
}

// A single edge between two vertices that must already exist in `Graph.nodes`.
// An edge naming a vertex id that is not in the graph is rejected rather than
// silently creating that vertex.
message GraphEdge {
  // Source vertex id (the tail). Must appear in Graph.nodes.
  string from = 1;
  // Target vertex id (the head). Must appear in Graph.nodes.
  string to = 2;
  // Edge cost. IMPORTANT: an omitted or zero weight is treated as 1.0 unless
  // `explicit_zero_weight` is set — so sending 0 gives you a cost of 1, not 0.
  // Must be finite; NaN and infinity are rejected.
  double weight = 3;
  // Set this to true to make a `weight` of 0 mean a genuine zero cost instead
  // of being defaulted to 1.0. Needed only for zero-cost edges.
  bool explicit_zero_weight = 4;
}

// The canonical graph envelope shared by every node in this package: a set of
// uniquely-identified vertices plus the edges between them.
//
// Limits, enforced on the raw input before anything is allocated: at most
// 20000 vertices, at most 200000 edges, and at most 3 MiB of total encoded
// size. Individual all-pairs operations impose tighter limits of their own.
message Graph {
  // True for a directed graph, false for an undirected graph. Several nodes
  // require one or the other and say so in their description.
  bool directed = 1;
  // The vertices. Ids must be unique and non-empty.
  repeated GraphNode nodes = 2;
  // The edges. Both endpoints of every edge must reference an existing vertex.
  repeated GraphEdge edges = 3;
}

// A request for the single cheapest path between two vertices.
message ShortestPathRequest {
  // The graph to search.
  Graph graph = 1;
  // Source vertex id. Must exist in the graph.
  string from = 2;
  // Target vertex id. Must exist in the graph.
  string to = 3;
}

// A shortest path and its total cost.
//
// Check `error` FIRST: when `error` is non-empty the request was rejected and
// every other field is meaningless. `found` is false both when no path exists
// and when the request was rejected, so `found` alone cannot tell the two apart.
message ShortestPathResult {
  // True when a path exists from `from` to `to` AND `error` is empty.
  bool found = 1;
  // The vertex ids in order from source to target. Empty when not found.
  repeated string path = 2;
  // The sum of the traversed edge weights. Zero when not found.
  double total_weight = 3;
  // The number of edges traversed, i.e. len(path)-1. Zero when not found.
  int32 hop_count = 4;
  // Structured error message. Empty on success.
  string error = 5;
}

// A request for the shortest-path distance from one source to every vertex.
message DistancesRequest {
  // The graph to search.
  Graph graph = 1;
  // Source vertex id. Must exist in the graph.
  string from = 2;
}

// The shortest-path distance from the source to one vertex.
message Distance {
  // The target vertex id.
  string node = 1;
  // The total shortest-path cost from the source to this vertex.
  double weight = 2;
  // The fewest edges among the shortest paths to this vertex. When several
  // paths tie on weight, this is the hop count of the shortest of them.
  int32 hop_count = 3;
}

// Distances from a single source to every reachable vertex.
//
// Check `error` first; when it is non-empty the other fields are meaningless.
message DistancesResult {
  // Every reachable vertex, sorted by vertex id. Includes the source itself at
  // distance 0.
  repeated Distance distances = 1;
  // Vertex ids with no path from the source, sorted.
  repeated string unreachable = 2;
  // Structured error message. Empty on success.
  string error = 3;
}

// A topological (dependency) ordering of a directed acyclic graph.
//
// Check `error` first: `is_dag` is false both for a cyclic graph and for a
// rejected request.
message TopoSortResult {
  // True when the graph is a DAG and `order` is therefore valid.
  bool is_dag = 1;
  // The vertices in dependency order: every edge points from an earlier entry
  // to a later one. Empty when the graph is not a DAG.
  repeated string order = 2;
  // Structured error message. Empty on success.
  string error = 3;
}

// One component: a set of mutually-reachable vertices.
message Component {
  // The vertex ids in this component, sorted.
  repeated string nodes = 1;
}

// The connected components of a graph.
message ComponentsResult {
  // The components, each internally sorted, ordered by their smallest member.
  repeated Component components = 1;
  // The number of components.
  int32 count = 2;
  // True when these are STRONGLY connected components, which is the case
  // exactly when the input graph was directed.
  bool strongly_connected = 3;
  // Structured error message. Empty on success.
  string error = 4;
}

// A request for per-vertex centrality scores.
message CentralityRequest {
  // The graph to score.
  Graph graph = 1;
  // Which measure to compute. One of, exactly and in lower case:
  //   "degree"       — number of incident edges (in+out for a directed graph).
  //   "betweenness"  — how many shortest paths run through the vertex, counted
  //                    over unordered pairs, matching the standard unnormalised
  //                    (Brandes/networkx) convention. Computed on the UNWEIGHTED
  //                    hop-count topology; edge weights are ignored here.
  //   "closeness"    — reciprocal of the summed distance FROM every vertex
  //                    that can reach it (the standard incoming convention).
  //                    Rejects graphs containing a zero-weight edge, since a
  //                    distinct vertex at distance 0 makes the value infinite.
  //   "eccentricity" — distance to the farthest vertex the vertex can REACH
  //                    (the outgoing convention).
  //   "harmonic"     — sum of the reciprocal distances FROM every vertex that
  //                    can reach it (the standard incoming convention). Also
  //                    rejects zero-weight edges, for the same reason.
  // Defaults to "degree" when empty. Any other value is rejected.
  //
  // Every measure except "degree" needs an all-pairs shortest-path
  // computation, and therefore rejects negative edge weights, graphs above
  // 600 vertices, and graphs whose vertex count times edge count exceeds
  // 1200000.
  string measure = 2;
}

// One vertex's centrality score.
message CentralityScore {
  // The vertex id.
  string node = 1;
  // The centrality value under the requested measure. Always finite: a vertex
  // that can reach nothing (or that nothing reaches) scores 0 rather than
  // infinity.
  double score = 2;
}

// Per-vertex centrality scores.
message CentralityResult {
  // One entry per vertex, sorted by vertex id.
  repeated CentralityScore scores = 1;
  // The measure actually computed, which is "degree" when none was requested.
  string measure = 2;
  // Structured error message. Empty on success.
  string error = 3;
}

// A request for PageRank scores.
message PageRankRequest {
  // The graph to rank.
  Graph graph = 1;
  // Damping factor. Must be greater than 0 and AT MOST 0.99, and must be
  // finite — NaN and infinity are rejected. Defaults to 0.85 when omitted or
  // zero. The upper bound is 0.99 rather than 1 because the power iteration
  // needs about log(tolerance)/log(damping) steps, so the cost grows without
  // limit as damping approaches 1.
  double damping = 2;
  // Field 3 was `tolerance`. It was removed before publication: a
  // caller-tunable convergence tolerance made results irreproducible and let a
  // caller drive the iteration count. The tolerance is pinned internally.
  reserved 3;
}

// One vertex's PageRank score.
message PageRankScore {
  // The vertex id.
  string node = 1;
  // The PageRank value, rounded to 6 decimal places.
  double score = 2;
}

// PageRank scores for every vertex.
//
// The power iteration runs from a FIXED uniform start vector, accumulating in a
// fixed order, so the raw scores are bit-for-bit reproducible for a given input
// — not merely reproducible after rounding. Scores are then rounded to 6
// decimal places, so they sum to 1 only up to that rounding: the drift is at
// most 5e-7 per vertex, so about 1e-6 on a small graph and up to ~0.01 on a
// 20000-vertex one. Compare ratios rather than relying on the sum.
message PageRankResult {
  // One entry per vertex, sorted by vertex id.
  repeated PageRankScore scores = 1;
  // The damping factor actually used.
  double damping = 2;
  // Structured error message. Empty on success.
  string error = 3;
}

// Whether a graph contains a cycle, with one concrete example.
//
// Check `error` first: `has_cycle` is false both for an acyclic graph and for
// a rejected request.
message CycleResult {
  // True when the graph contains at least one cycle.
  bool has_cycle = 1;
  // One example cycle, as vertex ids, with the first id repeated at the end to
  // close it. Empty when there is no cycle.
  repeated string cycle = 2;
  // A count of INDEPENDENT cycles, not of distinct cycles, and the two
  // branches measure different things — do not compare this value across the
  // `directed` flag:
  //   directed   — the number of strongly connected components that contain a
  //                cycle, plus the number of self-loops. A single component
  //                holding many cycles counts once.
  //   undirected — the circuit rank |E| - |V| + (number of components), where
  //                |E| counts only NON-self-loop edges, plus the number of
  //                self-loops. This is the size of the cycle basis; a graph
  //                with 3 independent cycles has 7 distinct cycles, and this
  //                field reports 3.
  int32 cycle_count = 3;
  // Structured error message. Empty on success.
  string error = 4;
}

// A structural summary of a graph.
message GraphStats {
  // The number of vertices.
  int32 node_count = 1;
  // The number of edges, including self-loops.
  int32 edge_count = 2;
  // Whether the graph is directed.
  bool directed = 3;
  // Edges divided by the maximum possible edges, excluding self-loops. Zero
  // when the graph has fewer than 2 vertices.
  double density = 4;
  // True when the graph is directed AND acyclic. Always false for undirected
  // input, regardless of whether it has cycles.
  bool is_dag = 5;
  // True when every vertex is reachable from every other, ignoring edge
  // direction (weak connectivity). False for an empty graph.
  bool is_connected = 6;
  // The number of connected components, ignoring edge direction.
  int32 component_count = 7;
  // The mean vertex degree, 2*|E|/|V| for BOTH directed and undirected graphs.
  // For a directed graph this is the mean TOTAL degree (in plus out), since
  // summing every vertex's in- and out-degree gives 2*|E| either way — so this
  // is exactly the mean of Centrality's per-vertex "degree" scores. A self-loop
  // counts 2. Zero when there are no vertices.
  double average_degree = 8;
  // The number of edges whose two endpoints are the same vertex.
  int32 self_loop_count = 9;
  // The sum of every edge weight, after the zero-means-one defaulting rule.
  // Lets a MinimumSpanningTree result be weighed by piping it into Describe.
  double total_weight = 11;
  // Structured error message. Empty on success.
  string error = 10;
}

// A request for the subgraph induced by a set of vertices.
message SubgraphRequest {
  // The source graph.
  Graph graph = 1;
  // The vertex ids to keep. Every id must exist in the graph; an unknown id is
  // rejected rather than ignored. An empty list yields an empty graph.
  repeated string nodes = 2;
}

// A request to reinterpret a graph's edge direction.
message OrientRequest {
  // The graph to reorient.
  Graph graph = 1;
  // True to produce a DIRECTED graph, false to produce an UNDIRECTED one.
  // Converting to directed replaces each undirected edge with a pair of
  // opposing edges; converting to undirected collapses any pair of opposing
  // edges into one, keeping the smaller weight. A graph that already has the
  // requested direction is returned unchanged.
  bool directed = 2;
}
